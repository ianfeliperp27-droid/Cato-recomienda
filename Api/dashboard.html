<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cato Recomienda — Pop Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --rojo: #D62828; --amarillo: #F5B731; --naranja: #FF8C42;
      --negro: #2D3436; --blanco: #FFFFFF; --verde: #2E7D32;
      --bg-pagina: var(--blanco); --bg-card: var(--blanco); --texto: var(--negro);
    }

    [data-theme="dark"] {
      --bg-pagina: #1a1a1a; --bg-card: #2d2d2d; --texto: #f0f0f0; --blanco: #2d2d2d;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.3s; }

    body {
      font-family: 'Quicksand', sans-serif;
      background-color: var(--bg-pagina);
      color: var(--texto);
      overflow-x: hidden;
    }

    /* --- DECORACIONES LATERALEZ (PC) --- */
    @media (min-width: 1200px) {
      .deco-pop { position: fixed; z-index: -1; pointer-events: none; opacity: 0.25; }
      
      /* Izquierda: Cato y Onomatopeya */
      .cato-left { bottom: 40px; left: 30px; width: 250px; animation: float 4s ease-in-out infinite; filter: drop-shadow(8px 8px 0 var(--negro)); opacity: 0.4; }
      .ono-l { top: 20%; left: 5%; font-family: 'Bangers'; font-size: 5rem; color: var(--rojo); transform: rotate(-15deg); }
      .emoji-l { top: 50%; left: 10%; font-size: 5rem; }

      /* Derecha: Comida */
      .burger-r { top: 15%; right: 5%; font-size: 8rem; transform: rotate(15deg); }
      .pizza-r { bottom: 20%; right: 5%; font-size: 7rem; transform: rotate(-10deg); }
      .ono-r { top: 45%; right: 8%; font-family: 'Bangers'; font-size: 4rem; color: var(--amarillo); transform: rotate(10deg); }

      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(-5deg); }
        50% { transform: translateY(-25px) rotate(5deg); }
      }
    }

    /* HEADER */
    .header {
      background: var(--rojo); border-bottom: 6px solid var(--negro);
      padding: 30px 20px; text-align: center; box-shadow: 0 6px 0 rgba(0,0,0,0.2);
    }
    .logo-main { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--negro); background: white; margin-bottom: 15px; box-shadow: 4px 4px 0 var(--negro); }
    .logo-text { font-family: 'Bangers', cursive; font-size: 4rem; color: var(--amarillo); text-shadow: 5px 5px 0 var(--negro); letter-spacing: 2px; }

    .main-wrapper { max-width: 900px; margin: 0 auto; padding: 20px; position: relative; }

    /* STATS */
    .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: -40px auto 30px; position: relative; z-index: 10; }
    .stat-box { background: var(--bg-card); border: 4px solid var(--negro); box-shadow: 6px 6px 0 var(--negro); padding: 15px; text-align: center; border-radius: 12px; }
    .stat-num { font-family: 'Bangers'; font-size: 2.2rem; line-height: 1; margin-bottom: 5px; }

    /* FILTROS */
    .comic-input { width: 100%; padding: 18px; border: 4px solid var(--negro); box-shadow: 6px 6px 0 var(--negro); background: var(--bg-card); color: var(--texto); font-weight: 900; font-size: 1.1rem; margin-bottom: 25px; outline: none; }
    
    /* GRID DE CARDS */
    .cards-zone { display: grid; grid-template-columns: 1fr; gap: 20px; }
    @media (min-width: 768px) { .cards-zone { grid-template-columns: 1fr 1fr; } }

    .resto-card {
      background: var(--bg-card); border: 4px solid var(--negro); box-shadow: 6px 6px 0 var(--negro);
      padding: 20px; display: flex; align-items: center; gap: 15px; position: relative;
    }
    .card-emoji { font-size: 2.5rem; background: var(--amarillo); padding: 10px; border: 3px solid var(--negro); border-radius: 10px; box-shadow: 3px 3px 0 var(--negro); }
    .card-name { font-weight: 800; font-size: 1.2rem; margin-bottom: 5px; }
    
    /* BANNER AMIGOS */
    .friends-banner {
      display: block; margin-top: 50px; background: var(--negro); border: 4px solid var(--negro);
      padding: 25px; text-align: center; text-decoration: none; color: var(--amarillo);
      box-shadow: 8px 8px 0 var(--rojo); font-family: 'Bangers'; font-size: 1.8rem;
    }
    .friends-banner:active { transform: translate(4px, 4px); box-shadow: 4px 4px 0 var(--rojo); }

    .dark-toggle { position: fixed; bottom: 25px; right: 25px; background: var(--amarillo); border: 3px solid var(--negro); width: 60px; height: 60px; border-radius: 50%; cursor: pointer; font-size: 1.8rem; z-index: 100; box-shadow: 4px 4px 0 var(--negro); }
  </style>
</head>
<body>

  <img src="Cato-Recomienda--Logo.jpg" class="deco-pop cato-left">
  <div class="deco-pop ono-l">¡AMÉN!</div>
  <div class="deco-pop emoji-l">🥤</div>
  
  <div class="deco-pop burger-r">🍔</div>
  <div class="deco-pop pizza-r">🍕</div>
  <div class="deco-pop ono-r">¡YUM!</div>

  <button class="dark-toggle" onclick="toggleDarkMode()" id="theme-btn">🌙</button>

  <div class="header">
    <img src="Cato-Recomienda--Logo.jpg" class="logo-main">
    <h1 class="logo-text">CATO RECOMIENDA</h1>
  </div>

  <div class="main-wrapper">
    
    <div class="stats-bar">
      <div class="stat-box"><div class="stat-num" id="stat-total" style="color:var(--rojo)">0</div><div style="font-size:0.7rem; font-weight:800">SITIOS</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-open" style="color:var(--verde)">0</div><div style="font-size:0.7rem; font-weight:800">ABIERTOS</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-rating" style="color:var(--naranja)">0.0</div><div style="font-size:0.7rem; font-weight:800">RATING</div></div>
    </div>

    <input type="text" id="buscar" class="comic-input" placeholder="¿QUÉ SE TE ANTOJA?..." oninput="filtrar()">

    <button onclick="recomendarAzar()" style="width:100%; background:var(--amarillo); color:var(--negro); font-family:'Bangers'; font-size:2rem; padding:15px; border:4px solid var(--negro); box-shadow:6px 6px 0 var(--negro); margin-bottom:30px; cursor:pointer;">
      🎲 ¡SORPRESA!
    </button>

    <div class="cards-zone" id="cards-zone"></div>

    <a href="URL_AQUÍ" target="_blank" class="friends-banner">
      ¡MIRA EL PROYECTO DE MIS COMPAS! ✨
    </a>

  </div>

  <script>
    // Lógica Modo Noche
    function toggleDarkMode() {
      const body = document.documentElement;
      const isDark = body.getAttribute('data-theme') === 'dark';
      body.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }
    if(localStorage.getItem('theme')==='dark') toggleDarkMode();

    // Simulación de datos (Esto se conectará a tu API)
    async function cargarDatos() {
        try {
            const res = await fetch('/api/restaurantes');
            const data = await res.json();
            window.datos = data.restaurantes;
            filtrar();
        } catch(e) { console.log("Error API"); }
    }

    function renderCards(lista) {
      const zone = document.getElementById('cards-zone');
      const emojis = {"Hamburguesas": "🍔", "Pizza": "🍕", "Sushi": "🍣", "Corrientazo": "🍲"};
      zone.innerHTML = lista.map(d => `
        <div class="resto-card">
          <div class="card-emoji">${emojis[d.categoria] || "🍴"}</div>
          <div style="flex:1">
            <div class="card-name">${d.nombre}</div>
            <div style="font-size:0.8rem; font-weight:700; opacity:0.8">⭐ ${d.rating} — ${d.categoria}</div>
          </div>
          <div style="font-size:0.7rem; font-weight:900; color:${d.activo?'var(--verde)':'var(--rojo)'}">
            ${d.activo ? '● OPEN' : '○ CLOSED'}
          </div>
        </div>
      `).join('');
    }

    function filtrar() {
      const q = document.getElementById('buscar').value.toLowerCase();
      const filtrados = window.datos.filter(d => d.nombre.toLowerCase().includes(q) || d.categoria.toLowerCase().includes(q));
      renderCards(filtrados);
      document.getElementById('stat-total').textContent = filtrados.length;
      document.getElementById('stat-open').textContent = filtrados.filter(x=>x.activo).length;
      const prom = filtrados.length ? (filtrados.reduce((s,x)=>s+x.rating,0)/filtrados.length).toFixed(1) : 0;
      document.getElementById('stat-rating').textContent = prom;
    }

    function recomendarAzar() {
      const azar = window.datos[Math.floor(Math.random()*window.datos.length)];
      alert("CATO DICE: ¡HOY SE COME EN " + azar.nombre.toUpperCase() + "! 🦆🔥");
    }

    cargarDatos();
  </script>
</body>
</html>

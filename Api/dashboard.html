<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cato Recomienda — Pop Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --rojo:#D62828; --amarillo:#F5B731; --naranja:#FF8C42;
      --negro:#2D3436; --verde:#2E7D32;
      --bg:#FFFFFF; --bg-card:#FFFFFF; --texto:#2D3436;
    }
    [data-theme="dark"] { --bg:#1a1a1a; --bg-card:#2d2d2d; --texto:#f0f0f0; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Quicksand',sans-serif; background:var(--bg); color:var(--texto); overflow-x:hidden; transition:background 0.3s,color 0.3s; }
 
    /* Decoraciones PC */
    .deco { position:fixed; z-index:0; pointer-events:none; }
    .deco-ono { font-family:'Bangers'; }
    .d1{top:18%;left:3%;font-size:5rem;color:var(--rojo);opacity:0.12;transform:rotate(-15deg);}
    .d2{top:55%;left:8%;font-size:4rem;opacity:0.08;}
    .d3{top:12%;right:4%;font-size:7rem;opacity:0.08;transform:rotate(12deg);}
    .d4{bottom:18%;right:4%;font-size:6rem;opacity:0.08;transform:rotate(-8deg);}
    .d5{top:42%;right:7%;font-size:4rem;color:var(--amarillo);opacity:0.12;transform:rotate(10deg);}
    @media(max-width:900px){.deco{display:none;}}
 
    /* Header */
    .header{background:var(--rojo);border-bottom:6px solid var(--negro);padding:24px 20px 20px;text-align:center;box-shadow:0 6px 0 rgba(0,0,0,0.2);position:relative;z-index:1;}
    .logo-main{width:85px;height:85px;border-radius:50%;border:4px solid var(--negro);background:white;margin:0 auto 12px;display:block;box-shadow:4px 4px 0 var(--negro);object-fit:cover;}
    .logo-text{font-family:'Bangers',cursive;font-size:3rem;color:var(--amarillo);text-shadow:4px 4px 0 var(--negro);letter-spacing:2px;}
    @media(max-width:480px){.logo-main{width:65px;height:65px;}.logo-text{font-size:2rem;}.header{padding:16px 12px;}}
 
    .wrap{max-width:860px;margin:0 auto;padding:20px 16px 80px;position:relative;z-index:1;}
 
    /* Stats */
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:-30px 0 24px;position:relative;z-index:10;}
    .stat-box{background:var(--bg-card);border:4px solid var(--negro);box-shadow:5px 5px 0 var(--negro);padding:14px 8px;text-align:center;border-radius:12px;}
    .stat-num{font-family:'Bangers';font-size:2rem;line-height:1;margin-bottom:4px;}
    .stat-lbl{font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;opacity:0.7;}
    @media(max-width:480px){.stat-num{font-size:1.5rem;}.stat-box{padding:10px 4px;}}
 
    /* Buscador */
    .search-input{width:100%;padding:14px 16px;font-family:'Quicksand',sans-serif;font-size:1rem;font-weight:700;border:4px solid var(--negro);box-shadow:5px 5px 0 var(--negro);background:var(--bg-card);color:var(--texto);outline:none;margin-bottom:16px;}
    .search-input::placeholder{opacity:0.5;}
 
    /* Filtros */
    .filtros{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
    .filtro-btn{padding:9px 12px;font-family:'Bangers';font-size:0.95rem;letter-spacing:0.5px;border:3px solid var(--negro);box-shadow:3px 3px 0 var(--negro);background:var(--bg-card);color:var(--texto);cursor:pointer;transition:transform 0.1s,box-shadow 0.1s;}
    .filtro-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--negro);}
    .filtro-btn.activo{background:var(--amarillo);color:var(--negro);}
 
    /* Botón sorpresa */
    .btn-sorpresa{width:100%;padding:16px;margin-bottom:24px;background:var(--amarillo);color:var(--negro);font-family:'Bangers';font-size:1.6rem;letter-spacing:1px;border:4px solid var(--negro);box-shadow:6px 6px 0 var(--negro);cursor:pointer;transition:transform 0.1s,box-shadow 0.1s;}
    .btn-sorpresa:active{transform:translate(3px,3px);box-shadow:3px 3px 0 var(--negro);}
 
    /* Cards */
    .cards-zone{display:grid;grid-template-columns:1fr;gap:14px;}
    @media(min-width:600px){.cards-zone{grid-template-columns:1fr 1fr;}}
    @media(min-width:860px){.cards-zone{grid-template-columns:1fr 1fr 1fr;}}
    .card{background:var(--bg-card);border:4px solid var(--negro);box-shadow:5px 5px 0 var(--negro);padding:16px;display:flex;align-items:center;gap:12px;transition:transform 0.15s,box-shadow 0.15s;}
    .card:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 var(--negro);}
    .card-emoji{font-size:2rem;background:var(--amarillo);padding:10px;border:3px solid var(--negro);border-radius:10px;box-shadow:3px 3px 0 var(--negro);flex-shrink:0;line-height:1;}
    .card-body{flex:1;min-width:0;}
    .card-name{font-weight:800;font-size:1rem;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .card-meta{font-size:0.78rem;opacity:0.75;font-weight:600;}
    .card-status{font-size:0.7rem;font-weight:900;flex-shrink:0;}
    .open{color:var(--verde);}.closed{color:var(--rojo);}
    .empty{text-align:center;padding:3rem 1rem;font-family:'Bangers';font-size:1.5rem;opacity:0.4;}
 
    /* Modal */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;padding:20px;}
    .modal-bg.visible{display:flex;}
    .modal{background:var(--bg-card);border:6px solid var(--negro);box-shadow:10px 10px 0 var(--negro);padding:32px 28px;text-align:center;max-width:380px;width:100%;}
    .modal-emoji{font-size:4rem;margin-bottom:12px;display:block;}
    .modal-title{font-family:'Bangers';font-size:1.6rem;color:var(--rojo);margin-bottom:8px;}
    .modal-nombre{font-family:'Bangers';font-size:2rem;color:var(--negro);margin-bottom:6px;}
    .modal-info{font-size:0.9rem;font-weight:600;opacity:0.7;margin-bottom:20px;}
    .modal-close{width:100%;padding:14px;background:var(--rojo);color:white;font-family:'Bangers';font-size:1.3rem;border:4px solid var(--negro);box-shadow:4px 4px 0 var(--negro);cursor:pointer;}
    .modal-close:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--negro);}
 
    /* Banner */
    .banner{display:block;margin-top:32px;background:var(--negro);padding:20px;text-align:center;text-decoration:none;color:var(--amarillo);box-shadow:6px 6px 0 var(--rojo);font-family:'Bangers';font-size:1.4rem;letter-spacing:1px;transition:transform 0.1s,box-shadow 0.1s;}
    .banner:active{transform:translate(3px,3px);box-shadow:3px 3px 0 var(--rojo);}
 
    .dark-btn{position:fixed;bottom:20px;right:20px;background:var(--amarillo);border:3px solid var(--negro);width:52px;height:52px;border-radius:50%;cursor:pointer;font-size:1.4rem;z-index:100;box-shadow:4px 4px 0 var(--negro);}
    .footer-count{text-align:center;font-size:0.75rem;opacity:0.5;font-weight:700;margin-top:16px;}
  </style>
</head>
<body>
 
  <div class="deco deco-ono d1">¡AMÉN!</div>
  <div class="deco d2">🥤</div>
  <div class="deco d3">🍔</div>
  <div class="deco d4">🍕</div>
  <div class="deco deco-ono d5">¡YUM!</div>
 
  <!-- Modal Sorpresa -->
  <div class="modal-bg" id="modal" onclick="cerrarFondo(event)">
    <div class="modal">
      <span class="modal-emoji" id="modal-emoji">🦆</span>
      <div class="modal-title">CATO DICE:</div>
      <div class="modal-nombre" id="modal-nombre">—</div>
      <div class="modal-info" id="modal-info">—</div>
      <button class="modal-close" onclick="cerrarModal()">¡VAMOS! 🔥</button>
    </div>
  </div>

    <h1 class="logo-text">CATO RECOMIENDA</h1>
  </header>
 
  <main class="wrap">
    <div class="stats">
      <div class="stat-box"><div class="stat-num" id="stat-total" style="color:var(--rojo)">0</div><div class="stat-lbl">Sitios</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-open" style="color:var(--verde)">0</div><div class="stat-lbl">Abiertos</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-rating" style="color:var(--naranja)">0.0</div><div class="stat-lbl">Rating</div></div>
    </div>
 
    <input type="text" id="buscar" class="search-input" placeholder="¿QUÉ SE TE ANTOJA?..." oninput="filtrar()">
    <div class="filtros" id="filtros-zona"></div>
    <button class="btn-sorpresa" onclick="sorpresa()">🎲 ¡SORPRESA!</button>
    <div class="cards-zone" id="cards-zone"><div class="empty">Cargando... 🦆</div></div>
    <div class="footer-count" id="footer-count"></div>
    <a href="#" class="banner">¡MIRA EL PROYECTO DE MIS COMPAS! ✨</a>
  </main>
 
  <button class="dark-btn" id="dark-btn" onclick="toggleDark()">🌙</button>
 
  <script>
    var EMOJIS = {"Hamburguesas":"🍔","Pizza":"🍕","Sushi":"🍣","Corrientazo":"🍲","Tacos":"🌮","Ensaladas":"🥗","Pollo":"🍗","Bebidas":"🧋"};
    var datos = [];
    var catActiva = "";
 
    async function cargarDatos() {
      try {
        var res = await fetch('/restaurantes');
        var json = await res.json();
        datos = json.restaurantes || [];
      } catch(e) {
        datos = [
          {id:1,nombre:"El Corral Universitario",categoria:"Hamburguesas",rating:4.5,activo:true},
          {id:2,nombre:"Punto Rojo Express",categoria:"Corrientazo",rating:4.1,activo:true},
          {id:3,nombre:"Sushi Nikkei UCC",categoria:"Sushi",rating:4.8,activo:false},
          {id:4,nombre:"La Mazorca Criolla",categoria:"Corrientazo",rating:3.9,activo:true},
          {id:5,nombre:"Pizza Hub Norte",categoria:"Pizza",rating:4.2,activo:true}
        ];
      }
      window.datos = datos;
      construirFiltros();
      filtrar();
    }
 
    function construirFiltros() {
      var cats = datos.map(function(d){return d.categoria;}).filter(function(c,i,a){return a.indexOf(c)===i;}).sort();
      var html = '<button class="filtro-btn activo" onclick="setCat(\'\',this)">TODAS</button>';
      cats.forEach(function(c){
        html += '<button class="filtro-btn" onclick="setCat(\''+c+'\',this)">'+(EMOJIS[c]||"🍽")+' '+c+'</button>';
      });
      document.getElementById('filtros-zona').innerHTML = html;
    }
 
    function setCat(cat, btn) {
      catActiva = cat;
      document.querySelectorAll('.filtro-btn').forEach(function(b){b.classList.remove('activo');});
      btn.classList.add('activo');
      filtrar();
    }
 
    function filtrar() {
      var q = document.getElementById('buscar').value.toLowerCase();
      var lista = datos.filter(function(d){
        return (d.nombre.toLowerCase().includes(q)||d.categoria.toLowerCase().includes(q)) &&
               (!catActiva||d.categoria===catActiva);
      });
      renderCards(lista);
      actualizarStats(lista);
    }
 
    function renderCards(lista) {
      var zone = document.getElementById('cards-zone');
      if (!lista.length) { zone.innerHTML='<div class="empty">Sin resultados 🍽</div>'; document.getElementById('footer-count').textContent=''; return; }
      zone.innerHTML = lista.map(function(d){
        return '<div class="card">'+
          '<div class="card-emoji">'+(EMOJIS[d.categoria]||"🍽")+'</div>'+
          '<div class="card-body"><div class="card-name">'+d.nombre+'</div>'+
          '<div class="card-meta">⭐ '+d.rating.toFixed(1)+' · '+d.categoria+'</div></div>'+
          '<span class="card-status '+(d.activo?'open':'closed')+'">'+(d.activo?'● OPEN':'○ CLOSED')+'</span>'+
        '</div>';
      }).join('');
      document.getElementById('footer-count').textContent='Mostrando '+lista.length+' de '+datos.length+' restaurantes';
    }
 
    function actualizarStats(lista) {
      document.getElementById('stat-total').textContent = lista.length;
      document.getElementById('stat-open').textContent = lista.filter(function(d){return d.activo;}).length;
      var prom = lista.length ? (lista.reduce(function(s,d){return s+d.rating;},0)/lista.length).toFixed(1) : '0.0';
      document.getElementById('stat-rating').textContent = prom;
    }
 
    function sorpresa() {
      if (!datos.length) return;
      var d = datos[Math.floor(Math.random()*datos.length)];
      document.getElementById('modal-emoji').textContent = EMOJIS[d.categoria]||"🦆";
      document.getElementById('modal-nombre').textContent = d.nombre.toUpperCase();
      document.getElementById('modal-info').textContent = '⭐ '+d.rating.toFixed(1)+' · '+d.categoria+' · '+(d.activo?'ABIERTO':'CERRADO');
      document.getElementById('modal').classList.add('visible');
    }
    function cerrarModal() { document.getElementById('modal').classList.remove('visible'); }
    function cerrarFondo(e) { if(e.target.id==='modal') cerrarModal(); }
 
    function toggleDark() {
      var isDark = document.documentElement.getAttribute('data-theme')==='dark';
      document.documentElement.setAttribute('data-theme', isDark?'':'dark');
      document.getElementById('dark-btn').textContent = isDark?'🌙':'☀️';
      localStorage.setItem('theme', isDark?'light':'dark');
    }
    if(localStorage.getItem('theme')==='dark'){ document.documentElement.setAttribute('data-theme','dark'); document.getElementById('dark-btn').textContent='☀️'; }
 
    cargarDatos();
  </script>
</body>
</html>

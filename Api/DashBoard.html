<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cato-Recomienda — Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --rojo:    #D62828;
      --amarillo:#F5B731;
      --verde:   #2E7D32;
      --fondo:   #F5F5F5;
      --card-bg: #FFFFFF;
      --text:    #222222;
      --text-sub:#888888;
      --border:  #E8E8E8;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--fondo);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 2rem;
    }

    /* HEADER */
    .header {
      background: var(--rojo);
      padding: 18px 20px 14px;
      color: white;
    }
    .header-inner { max-width: 640px; margin: auto; }
    .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .logo-circle {
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .brand-name { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.01em; }
    .brand-sub  { font-size: 0.72rem; opacity: 0.85; margin-top: 1px; }
    .header-badge {
      display: inline-block;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    /* STATS */
    .stats-bar {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
    }
    .stats-inner {
      max-width: 640px; margin: auto;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .stat {
      background: var(--fondo);
      border-radius: 10px;
      padding: 10px 12px;
      text-align: center;
    }
    .stat-num { font-size: 1.5rem; font-weight: 700; color: var(--text); }
    .stat-num.rojo  { color: var(--rojo); }
    .stat-num.verde { color: var(--verde); }
    .stat-lbl {
      font-size: 0.67rem; color: var(--text-sub);
      text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px;
    }

    /* FILTERS */
    .filters {
      max-width: 640px; margin: 16px auto 0; padding: 0 16px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .search-wrap { position: relative; }
    .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      font-size: 14px; pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 10px 12px 10px 36px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.9rem; font-family: inherit;
      background: var(--card-bg);
      color: var(--text);
      outline: none; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--rojo); }
    .filter-row { display: flex; gap: 8px; }
    .filter-sel {
      flex: 1;
      padding: 9px 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.82rem; font-family: inherit;
      background: var(--card-bg);
      color: var(--text);
      outline: none; appearance: none;
      cursor: pointer; transition: border-color 0.2s;
    }
    .filter-sel:focus { border-color: var(--rojo); }

    /* CARDS */
    .cards-zone {
      max-width: 640px; margin: 14px auto 0; padding: 0 16px;
      display: flex; flex-direction: column; gap: 10px;
    }

    .resto-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      animation: slideIn 0.25s ease both;
      cursor: default;
      transition: border-color 0.2s, transform 0.15s;
    }
    .resto-card:hover {
      border-color: #CCC;
      transform: translateY(-1px);
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-emoji {
      width: 46px; height: 46px; border-radius: 12px;
      background: var(--fondo);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .card-body { flex: 1; min-width: 0; }
    .card-name {
      font-size: 0.95rem; font-weight: 600;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .cat-badge {
      font-size: 0.68rem; font-weight: 600;
      background: #FFF3CD; color: #7A4F00;
      border: 1px solid #F5B731;
      padding: 2px 7px; border-radius: 20px;
    }
    .stars { color: var(--amarillo); font-size: 0.78rem; letter-spacing: 0.5px; }
    .rating-txt { font-size: 0.75rem; color: var(--text-sub); }

    .card-right {
      display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0;
    }
    .status-dot {
      display: flex; align-items: center; gap: 4px;
      font-size: 0.72rem; font-weight: 700;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; }
    .dot-open   { background: #2E7D32; box-shadow: 0 0 0 2px rgba(46,125,50,0.18); }
    .dot-closed { background: #C62828; }
    .txt-open   { color: #2E7D32; }
    .txt-closed { color: #C62828; }
    .card-id { font-size: 0.68rem; color: var(--text-sub); }

    /* EMPTY STATE */
    .empty-state {
      text-align: center; padding: 3rem 1rem;
      color: var(--text-sub); font-size: 0.9rem;
    }
    .empty-icon { font-size: 2.2rem; margin-bottom: 8px; }

    /* FOOTER */
    .footer {
      max-width: 640px; margin: 14px auto 0; padding: 0 16px;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 4px;
    }
    .footer-count { font-size: 0.75rem; color: var(--text-sub); }
    .footer-brand { font-size: 0.68rem; color: #BBB; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-inner">
      <div class="header-top">
        <div class="logo-circle">🦆</div>
        <div>
          <div class="brand-name">Cato-Recomienda</div>
          <div class="brand-sub">Restaurantes cerca de la Católica 🍔</div>
        </div>
      </div>
      <div class="header-badge">Universidad Católica de Colombia · 2026</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stats-inner">
      <div class="stat">
        <div class="stat-num rojo" id="stat-total">0</div>
        <div class="stat-lbl">Restaurantes</div>
      </div>
      <div class="stat">
        <div class="stat-num verde" id="stat-open">0</div>
        <div class="stat-lbl">Abiertos</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-rating">0.0</div>
        <div class="stat-lbl">Rating prom.</div>
      </div>
    </div>
  </div>

  <!-- Filtros -->
  <div class="filters">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="buscar" type="text"
        placeholder="Buscar nombre o categoría..." oninput="filtrar()">
    </div>
    <div class="filter-row">
      <select class="filter-sel" id="cat-filter" onchange="filtrar()">
        <option value="">Todas las categorías</option>
      </select>
      <select class="filter-sel" id="estado-filter" onchange="filtrar()">
        <option value="">Todos</option>
        <option value="true">Abierto</option>
        <option value="false">Cerrado</option>
      </select>
    </div>
  </div>

  <!-- Tarjetas -->
  <div class="cards-zone" id="cards-zone"></div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-count" id="footer-count"></span>
    <span class="footer-brand">Cato-Recomienda · Azure App Service</span>
  </div>

  <script>
    // Emojis por categoría
    var catEmojis = {
      "Hamburguesas": "🍔",
      "Corrientazo":  "🍛",
      "Sushi":        "🍣",
      "Pizza":        "🍕",
      "Tacos":        "🌮",
      "Ensaladas":    "🥗",
      "Pollo":        "🍗",
      "Bebidas":      "🧋"
    };

    // -------------------------------------------------------
    // Cuando quieran conectar al API real, reemplacen "datos"
    // por un fetch así:
    //   fetch('/restaurantes')
    //     .then(r => r.json())
    //     .then(d => { datos = d.restaurantes; llenarCats(); filtrar(); });
    // -------------------------------------------------------
    var datos = [
      { id: 1, nombre: "El Corral Universitario", categoria: "Hamburguesas", rating: 4.5, activo: true  },
      { id: 2, nombre: "Punto Rojo Express",       categoria: "Corrientazo",  rating: 4.1, activo: true  },
      { id: 3, nombre: "Sushi Nikkei UCC",         categoria: "Sushi",        rating: 4.8, activo: false },
      { id: 4, nombre: "La Mazorca Criolla",       categoria: "Corrientazo",  rating: 3.9, activo: true  },
      { id: 5, nombre: "Pizza Hub Norte",          categoria: "Pizza",        rating: 4.2, activo: true  }
    ];

    // Genera estrellas a partir del rating
    function estrellas(r) {
      var s = "";
      for (var i = 1; i <= 5; i++) {
        if (i <= Math.floor(r))              s += "★";
        else if (i === Math.ceil(r) && r % 1 >= 0.5) s += "✦";
        else                                 s += "☆";
      }
      return s;
    }

    // Llena el select de categorías con las existentes
    function llenarCats() {
      var cats = datos
        .map(function(d) { return d.categoria; })
        .filter(function(c, i, a) { return a.indexOf(c) === i; })
        .sort();
      var sel = document.getElementById('cat-filter');
      cats.forEach(function(c) {
        var o = document.createElement('option');
        o.value = c;
        o.textContent = (catEmojis[c] || "🍽") + " " + c;
        sel.appendChild(o);
      });
    }

    // Renderiza las tarjetas con la lista recibida
    function renderCards(lista) {
      var zone = document.getElementById('cards-zone');

      if (lista.length === 0) {
        zone.innerHTML =
          '<div class="empty-state">' +
            '<div class="empty-icon">🍽</div>' +
            '<div>Sin resultados para esta búsqueda.</div>' +
          '</div>';
        return;
      }

      zone.innerHTML = lista.map(function(d, idx) {
        var emoji = catEmojis[d.categoria] || "🍽";
        return (
          '<div class="resto-card" style="animation-delay:' + (idx * 0.05) + 's">' +
            '<div class="card-emoji">' + emoji + '</div>' +
            '<div class="card-body">' +
              '<div class="card-name">' + d.nombre + '</div>' +
              '<div class="card-meta">' +
                '<span class="cat-badge">' + d.categoria + '</span>' +
                '<span class="stars">' + estrellas(d.rating) + '</span>' +
                '<span class="rating-txt">' + d.rating.toFixed(1) + '</span>' +
              '</div>' +
            '</div>' +
            '<div class="card-right">' +
              '<div class="status-dot">' +
                '<span class="dot ' + (d.activo ? 'dot-open' : 'dot-closed') + '"></span>' +
                '<span class="' + (d.activo ? 'txt-open' : 'txt-closed') + '">' +
                  (d.activo ? 'Abierto' : 'Cerrado') +
                '</span>' +
              '</div>' +
              '<div class="card-id">#' + d.id + '</div>' +
            '</div>' +
          '</div>'
        );
      }).join('');
    }

    // Actualiza las métricas superiores
    function actualizarStats(lista) {
      var abiertos = lista.filter(function(d) { return d.activo; }).length;
      var promedio = lista.length
        ? lista.reduce(function(s, d) { return s + d.rating; }, 0) / lista.length
        : 0;
      document.getElementById('stat-total').textContent  = lista.length;
      document.getElementById('stat-open').textContent   = abiertos;
      document.getElementById('stat-rating').textContent = promedio.toFixed(1);
    }

    // Aplica los filtros y re-renderiza
    function filtrar() {
      var q   = document.getElementById('buscar').value.toLowerCase();
      var cat = document.getElementById('cat-filter').value;
      var est = document.getElementById('estado-filter').value;

      var filtrados = datos.filter(function(d) {
        var matchNombre = d.nombre.toLowerCase().indexOf(q) !== -1 ||
                          d.categoria.toLowerCase().indexOf(q) !== -1;
        var matchCat    = !cat || d.categoria === cat;
        var matchEstado = est === '' || String(d.activo) === est;
        return matchNombre && matchCat && matchEstado;
      });

      renderCards(filtrados);
      actualizarStats(filtrados);
      document.getElementById('footer-count').textContent =
        'Mostrando ' + filtrados.length + ' de ' + datos.length + ' restaurantes';
    }

    // Iniciar
    llenarCats();
    filtrar();
  </script>

</body>
</html>
